<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FileVue</title>
<script src="libs/react.min.js"></script>
<script src="libs/react-dom.min.js"></script>
<script src="libs/babel.min.js"></script>
<script src="libs/recharts.min.js"></script>
<link href="libs/tailwind.min.css" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#080e1a;color:#e2e8f0;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px;}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #1e293b;background:#0f172a;gap:8px;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-ic{width:32px;height:32px;border-radius:8px;background:rgba(14,165,233,0.12);border:1px solid rgba(14,165,233,0.25);display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-tx{font-size:16px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,#0ea5e9,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(14,165,233,0.12);color:#0ea5e9;border:1px solid rgba(14,165,233,0.2);font-family:Consolas,'Courier New',monospace;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-right .hint{font-size:10px;color:#334155;font-family:Consolas,monospace;}

.main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sb{width:240px;min-width:180px;border-right:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden;background:rgba(15,23,42,0.5);flex-shrink:0;}
.dz{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;cursor:pointer;transition:background 0.3s;}
.dz.over{background:rgba(14,165,233,0.06);}
.dz .ico{font-size:44px;margin-bottom:12px;}
.dz h3{font-size:14px;font-weight:600;color:#cbd5e1;margin-bottom:3px;}
.dz p{font-size:12px;color:#64748b;}
.dz .ht{margin-top:14px;font-size:10px;color:#64748b;font-family:Consolas,monospace;background:#1e293b;padding:4px 10px;border-radius:5px;border:1px solid #334155;}
.add-b{display:flex;align-items:center;gap:7px;padding:9px 12px;border:none;background:none;color:#64748b;font-size:12px;cursor:pointer;border-bottom:1px solid #1e293b;width:100%;font-family:inherit;}
.add-b:hover{color:#e2e8f0;}
.flist{overflow:auto;flex:1;padding:3px 0;}
.fi{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;transition:all 0.12s;border-left:2px solid transparent;position:relative;}
.fi:hover{background:rgba(30,41,59,0.5);}
.fi.sel{background:rgba(14,165,233,0.1);border-left-color:#0ea5e9;}
.fi .em{font-size:16px;flex-shrink:0;}
.fi .nm{font-size:12px;font-weight:500;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi .mt{font-size:10px;color:#64748b;font-family:Consolas,monospace;}
.fi .x{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;font-size:13px;cursor:pointer;opacity:0;transition:opacity 0.12s;padding:2px 4px;}
.fi:hover .x{opacity:1;}.fi .x:hover{color:#f87171;}
.fi .hot{position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:9px;color:#34d399;opacity:0;transition:opacity 0.5s;}
.fi .hot.show{opacity:1;}

/* PREVIEW */
.pv{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.pv-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#64748b;opacity:0.5;}

.otabs{display:flex;border-bottom:1px solid #1e293b;background:#0c1220;overflow-x:auto;flex-shrink:0;}
.otabs::-webkit-scrollbar{height:3px;}
.ot{display:flex;align-items:center;gap:6px;padding:7px 12px;font-size:11px;font-family:inherit;font-weight:500;background:none;border:none;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.12s;}
.ot:hover{color:#cbd5e1;background:rgba(30,41,59,0.3);}
.ot.act{color:#0ea5e9;border-bottom-color:#0ea5e9;background:rgba(14,165,233,0.05);}
.ot .otx{font-size:10px;margin-left:4px;color:#475569;opacity:0;transition:opacity 0.12s;}
.ot:hover .otx{opacity:1;}.ot .otx:hover{color:#f87171;}
.ot .oem{font-size:13px;}

.pvh{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #1e293b;gap:8px;flex-shrink:0;}
.pvh .ti{display:flex;align-items:center;gap:7px;min-width:0;}
.pvh .ti span:last-child{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pvh .acts{display:flex;align-items:center;gap:4px;}
.ibtn{background:none;border:1px solid #1e293b;color:#64748b;width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.12s;}
.ibtn:hover{color:#e2e8f0;border-color:#334155;background:rgba(30,41,59,0.5);}
.ibtn.on{color:#0ea5e9;border-color:rgba(14,165,233,0.3);background:rgba(14,165,233,0.1);}

.pvm{display:flex;gap:9px;padding:5px 14px;font-size:10px;color:#64748b;font-family:Consolas,monospace;border-bottom:1px solid #1e293b;flex-shrink:0;align-items:center;}
.pvm .d{opacity:0.3;}
.pvm .status{display:flex;align-items:center;gap:4px;margin-left:auto;}
.pvm .dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.pvm .dot.ok{background:#34d399;box-shadow:0 0 6px #34d39966;}
.pvm .dot.err{background:#f87171;box-shadow:0 0 6px #f8717166;}

.mtabs{display:flex;border-bottom:1px solid #1e293b;flex-shrink:0;}
.mt_b{padding:7px 14px;font-size:11px;font-family:inherit;font-weight:500;background:none;border:none;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.12s;}
.mt_b:hover{color:#e2e8f0;}.mt_b.on{color:#0ea5e9;border-bottom-color:#0ea5e9;}

.pvbody{flex:1;overflow:auto;position:relative;}
#renderMount{width:100%;min-height:100%;background:#fff;color:#000;}
.code-pane{width:100%;height:100%;overflow:auto;padding:14px;font-family:Consolas,'Courier New',monospace;font-size:11px;color:#94a3b8;line-height:1.6;white-space:pre-wrap;word-break:break-word;background:#080e1a;}

.errpanel{flex-shrink:0;max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:#0c0a14;border-top:1px solid transparent;}
.errpanel.open{max-height:220px;border-top-color:rgba(248,113,113,0.2);}
.errpanel-head{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:rgba(248,113,113,0.06);cursor:pointer;}
.errpanel-head span{font-size:11px;font-weight:600;color:#f87171;font-family:Consolas,monospace;}
.errpanel-head .cnt{font-size:10px;padding:1px 7px;border-radius:10px;background:rgba(248,113,113,0.15);color:#f87171;}
.errpanel-body{overflow:auto;max-height:180px;padding:8px 14px;}
.err-item{padding:6px 0;border-bottom:1px solid rgba(248,113,113,0.08);font-size:11px;font-family:Consolas,monospace;color:#fca5a5;line-height:1.5;}
.err-item:last-child{border-bottom:none;}
.err-item .etype{font-size:9px;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-right:6px;font-weight:600;}
.err-item .etype.error{background:rgba(248,113,113,0.15);color:#f87171;}
.err-item .etype.warn{background:rgba(251,191,36,0.15);color:#fbbf24;}

.fs-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#080e1a;display:flex;flex-direction:column;}
.fs-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #1e293b;background:#0f172a;flex-shrink:0;}
.fs-bar .ti{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;}
.fs-body{flex:1;overflow:auto;}
.fs-body #fsMountWrap{width:100%;min-height:100%;background:#fff;color:#000;}

.center-pv{display:flex;align-items:center;justify-content:center;height:100%;padding:20px;}
.center-pv img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-ic">📂</div>
    <span class="logo-tx">FileVue</span>
    <span class="badge" id="cnt">0 files</span>
  </div>
  <div class="hdr-right">
    <span class="hint" id="hotLabel"></span>
    <span class="hint">PORTABLE · OFFLINE</span>
  </div>
</div>
<div class="main">
  <div class="sb" id="sb"></div>
  <div class="pv" id="pv"></div>
</div>
<input type="file" id="fi" multiple style="display:none"/>
<div id="fsOverlay"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const S = {
  files: [], openTabs: [], activeTab: null, mode: "render",
  codeCache: {}, roots: {}, errors: {}, renderStatus: {},
  errPanelOpen: false, fullscreen: false,
};
let _id = 0;
const sb = document.getElementById("sb");
const pv = document.getElementById("pv");
const fi = document.getElementById("fi");
const fsOverlay = document.getElementById("fsOverlay");

function cat(n){const e=n.split(".").pop().toLowerCase();const m={jsx:"react",tsx:"react",html:"html",htm:"html",png:"image",jpg:"image",jpeg:"image",gif:"image",webp:"image",svg:"image",bmp:"image",js:"code",ts:"code",py:"code",css:"code",json:"code",yaml:"code",sh:"code",sql:"code",rb:"code",go:"code",rs:"code",java:"code",c:"code",cpp:"code",php:"code",txt:"text",md:"text",csv:"text",log:"text",ini:"text",cfg:"text",pdf:"pdf",mp4:"video",webm:"video",mov:"video",avi:"video",mp3:"audio",wav:"audio",ogg:"audio",flac:"audio"};return m[e]||"file";}
const EM={react:"\u269B\uFE0F",html:"\uD83C\uDF10",image:"\uD83D\uDDBC\uFE0F",code:"\uD83D\uDCBB",text:"\uD83D\uDCC4",pdf:"\uD83D\uDCD5",video:"\uD83C\uDFAC",audio:"\uD83C\uDFB5",file:"\uD83D\uDCCE"};
function fmtSz(b){if(!b)return"0 B";const k=1024,u=["B","KB","MB","GB"],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+" "+u[i];}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ═══════════════════════════════════════════════
// FILE MANAGEMENT + HOT RELOAD
// ═══════════════════════════════════════════════
function addFiles(fl){
  let lastId=null;
  Array.from(fl).forEach(f=>{
    const existing=S.files.find(x=>x.name===f.name);
    if(existing){
      existing.raw=f; existing.size=f.size; existing.lastModified=f.lastModified;
      delete S.codeCache[existing.id]; S.errors[existing.id]=[];
      lastId=existing.id; flashHot(existing.id);
    } else {
      const id="f"+(++_id);
      S.files.push({id,name:f.name,size:f.size,lastModified:f.lastModified,cat:cat(f.name),raw:f});
      lastId=id;
    }
  });
  drawSB();
  if(lastId) openTab(lastId);
}

function flashHot(id){
  document.getElementById("hotLabel").textContent="\u26A1 hot-reloaded";
  setTimeout(()=>{document.getElementById("hotLabel").textContent="";},2000);
  setTimeout(()=>{const el=document.querySelector('.fi[data-id="'+id+'"] .hot');if(el){el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1500);}},50);
}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function drawSB(){
  document.getElementById("cnt").textContent=S.files.length+" file"+(S.files.length!==1?"s":"");
  if(!S.files.length){
    sb.innerHTML='<div class="dz" onclick="fi.click()"><div class="ico">\uD83D\uDCC1</div><h3>Drop files here</h3><p>or click to browse</p><div class="ht">drop again to hot-reload \u26A1</div></div>';
    return;
  }
  let h='<button class="add-b" onclick="fi.click()"><span style="font-size:16px">+</span> Add files</button><div class="flist">';
  S.files.forEach(f=>{
    const isSel=S.activeTab===f.id, isOpen=S.openTabs.includes(f.id);
    h+='<div class="fi'+(isSel?' sel':'')+'" data-id="'+f.id+'" onclick="openTab(\''+f.id+'\')">';
    h+='<span class="em">'+EM[f.cat]+'</span>';
    h+='<div style="min-width:0;flex:1"><div class="nm">'+(isOpen?'\u25CF ':'')+f.name+'</div><div class="mt">'+fmtSz(f.size)+'</div></div>';
    h+='<span class="hot">\u26A1</span>';
    h+='<button class="x" onclick="event.stopPropagation();rmFile(\''+f.id+'\')">\u2715</button></div>';
  });
  sb.innerHTML=h+"</div>";
}

function rmFile(id){S.files=S.files.filter(f=>f.id!==id);closeTab(id);delete S.codeCache[id];delete S.errors[id];delete S.renderStatus[id];cleanupRoot(id);drawSB();if(!S.activeTab)showEmpty();}

// ═══════════════════════════════════════════════
// TAB MANAGEMENT
// ═══════════════════════════════════════════════
function openTab(id){
  if(!S.openTabs.includes(id))S.openTabs.push(id);
  S.activeTab=id; S.mode="render"; drawSB(); loadAndRender(id);
}
function closeTab(id){
  cleanupRoot(id); S.openTabs=S.openTabs.filter(t=>t!==id);
  if(S.activeTab===id) S.activeTab=S.openTabs.length?S.openTabs[S.openTabs.length-1]:null;
  if(S.activeTab) loadAndRender(S.activeTab); else{drawSB();showEmpty();}
}
function switchTab(id){if(S.activeTab===id)return;cleanupRoot(S.activeTab);S.activeTab=id;S.mode="render";drawSB();loadAndRender(id);}
function cleanupRoot(id){if(S.roots[id]){try{S.roots[id].unmount();}catch(e){}delete S.roots[id];}}

// ═══════════════════════════════════════════════
// LOAD & RENDER
// ═══════════════════════════════════════════════
function loadAndRender(id){
  const f=S.files.find(x=>x.id===id); if(!f)return;
  if(f.cat==="react"||f.cat==="html"||f.cat==="code"||f.cat==="text"){
    if(S.codeCache[id]) showPreview(f,S.codeCache[id]);
    else readTxt(f.raw,src=>{S.codeCache[id]=src;showPreview(f,src);});
  } else if(f.cat==="image") readUrl(f.raw,src=>showImagePV(f,src));
  else if(f.cat==="pdf"||f.cat==="video"||f.cat==="audio") showMediaPV(f);
  else showInfoPV(f);
}
function readTxt(f,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsText(f);}
function readUrl(f,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(f);}
function showEmpty(){pv.innerHTML='<div class="pv-empty"><div style="font-size:40px;margin-bottom:10px;opacity:0.3">\uD83D\uDC41</div><span style="font-size:13px">Click a file to preview</span></div>';}

// ═══════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════
function buildTabBar(){
  if(!S.openTabs.length)return"";
  let h='<div class="otabs">';
  S.openTabs.forEach(id=>{const f=S.files.find(x=>x.id===id);if(!f)return;
    h+='<button class="ot'+(S.activeTab===id?' act':'')+'" onclick="switchTab(\''+id+'\')"><span class="oem">'+EM[f.cat]+'</span>'+esc(f.name)+'<span class="otx" onclick="event.stopPropagation();closeTab(\''+id+'\')">\u2715</span></button>';
  });
  return h+'</div>';
}

function buildHeader(f){
  const errs=S.errors[f.id]||[], st=S.renderStatus[f.id]||"ok";
  let h='<div class="pvh"><div class="ti"><span>'+EM[f.cat]+'</span><span>'+esc(f.name)+'</span></div><div class="acts">';
  if(errs.length) h+='<button class="ibtn'+(S.errPanelOpen?' on':'')+'" onclick="toggleErrPanel()" title="'+errs.length+' issue(s)">\u26A0</button>';
  h+='<button class="ibtn" onclick="enterFullscreen()" title="Fullscreen">\u26F6</button>';
  h+='<button class="ibtn" onclick="cleanupRoot(S.activeTab);S.activeTab=null;showEmpty();drawSB();" title="Close">\u2715</button>';
  h+='</div></div>';
  h+='<div class="pvm"><span>'+fmtSz(f.size)+'</span><span class="d">\u00B7</span><span>'+f.cat+'</span><span class="d">\u00B7</span><span>'+new Date(f.lastModified).toLocaleString()+'</span>';
  h+='<span class="status"><span class="dot '+st+'"></span>'+st+'</span></div>';
  return h;
}

function buildModeTabs(f){
  if(f.cat!=="react"&&f.cat!=="html")return"";
  return '<div class="mtabs"><button class="mt_b'+(S.mode==="render"?" on":"")+'" onclick="S.mode=\'render\';loadAndRender(S.activeTab)">\u25B6 Rendered</button><button class="mt_b'+(S.mode==="code"?" on":"")+'" onclick="S.mode=\'code\';loadAndRender(S.activeTab)">{ } Code</button></div>';
}

function buildErrPanel(id){
  const errs=S.errors[id]||[]; if(!errs.length)return"";
  let h='<div class="errpanel'+(S.errPanelOpen?' open':'')+'" id="errPanel"><div class="errpanel-head" onclick="toggleErrPanel()"><span>\u26A0 Issues</span><span class="cnt">'+errs.length+'</span></div><div class="errpanel-body">';
  errs.forEach(e=>{h+='<div class="err-item"><span class="etype '+e.type+'">'+e.type+'</span>'+esc(e.msg)+'</div>';});
  return h+'</div></div>';
}
function toggleErrPanel(){S.errPanelOpen=!S.errPanelOpen;const el=document.getElementById("errPanel");if(el)el.classList.toggle("open",S.errPanelOpen);}

// ═══════════════════════════════════════════════
// SHOW PREVIEWS
// ═══════════════════════════════════════════════
function showPreview(f,src){
  S.codeCache[f.id]=src;
  let html=buildTabBar()+buildHeader(f)+buildModeTabs(f);
  if(f.cat==="react"||f.cat==="html"){
    if(S.mode==="code"){html+='<div class="pvbody"><div class="code-pane">'+esc(src)+'</div></div>'+buildErrPanel(f.id);pv.innerHTML=html;return;}
    html+='<div class="pvbody"><div id="renderMount"></div></div>'+buildErrPanel(f.id);
    pv.innerHTML=html;
    if(f.cat==="html") renderHTML(f,src); else doRenderJSX(f,src);
  } else {
    html+='<div class="pvbody"><div class="code-pane">'+esc(src)+'</div></div>';
    pv.innerHTML=html;
  }
}

function showImagePV(f,src){pv.innerHTML=buildTabBar()+buildHeader(f)+"<div class='pvbody'><div class='center-pv'><img src='"+src+"'/></div></div>";}
function showMediaPV(f){
  const url=URL.createObjectURL(f.raw);
  let body="";
  if(f.cat==="pdf") body="<iframe src='"+url+"' style='width:100%;height:100%;border:none'></iframe>";
  else if(f.cat==="video") body="<div class='center-pv'><video src='"+url+"' controls style='max-width:100%;max-height:100%;border-radius:8px'></video></div>";
  else body="<div class='center-pv' style='flex-direction:column;gap:16px'><div style='font-size:48px'>\uD83C\uDFB5</div><audio src='"+url+"' controls style='width:320px'></audio></div>";
  pv.innerHTML=buildTabBar()+buildHeader(f)+"<div class='pvbody'>"+body+"</div>";
}
function showInfoPV(f){pv.innerHTML=buildTabBar()+buildHeader(f)+"<div class='pvbody'><div class='center-pv' style='flex-direction:column'><div style='font-size:48px'>"+EM[f.cat]+"</div><p style='color:#64748b;font-size:14px;margin-top:12px'>Preview not available</p></div></div>";}

// ═══════════════════════════════════════════════
// JSX COMPILER + RENDERER
// ═══════════════════════════════════════════════
function renderHTML(f,src){
  const body=document.getElementById("renderMount");if(!body)return;
  body.style.background="#fff";
  const iframe=document.createElement("iframe");
  iframe.style.cssText="width:100%;height:100%;border:none;background:#fff;min-height:500px;";
  iframe.srcdoc=src; body.innerHTML=""; body.appendChild(iframe);
  S.renderStatus[f.id]="ok"; S.errors[f.id]=[];
}

function doRenderJSX(f,source){
  const mount=document.getElementById("renderMount"); if(!mount)return;
  const errors=[];
  try{
    let code=source;
    code=code.replace(/^\s*import\s+[\s\S]*?from\s+['"][^'"]*['"]\s*;?\s*$/gm,"");
    code=code.replace(/^\s*import\s+['"][^'"]*['"]\s*;?\s*$/gm,"");
    code=code.replace(/export\s+default\s+/g,"");
    code=code.replace(/export\s+(?=function|const|let|var|class)/g,"");

    let mainComp=null;
    const re=/(?:function|const|class)\s+([A-Z][A-Za-z0-9_]*)/g;
    let m;while((m=re.exec(code))!==null)mainComp=m[1];
    if(!mainComp){mainComp="__FV__";code+="\nvar __FV__=typeof App!=='undefined'?App:function(){return React.createElement('div',{style:{padding:20,color:'#999'}},'No component found');};";}
    code+="\n;window.__fvComp=typeof "+mainComp+"==='function'?"+mainComp+":null;";

    let transformed;
    try{transformed=Babel.transform(code,{presets:["react"]}).code;}
    catch(babelErr){
      errors.push({type:"error",msg:"Babel: "+babelErr.message});
      S.errors[f.id]=errors;S.renderStatus[f.id]="err";
      mount.innerHTML='<div style="padding:20px;color:#f87171;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap">Compile Error:\n'+esc(babelErr.message)+'</div>';
      refreshErrPanel(f.id);return;
    }

    const ctx={};
    Object.keys(React).forEach(k=>{ctx[k]=React[k];});
    ctx.React=React;ctx.ReactDOM=ReactDOM;
    if(typeof Recharts!=="undefined")Object.keys(Recharts).forEach(k=>{ctx[k]=Recharts[k];});
    ctx.lucide=new Proxy({},{get:(_,prop)=>{if(typeof prop!=="string")return undefined;return(props)=>React.createElement("span",{style:{display:"inline-flex",width:props?.size||24,height:props?.size||24},title:prop,...props},"\u2B21");}});

    const argNames=Object.keys(ctx),argVals=argNames.map(k=>ctx[k]);
    window.__fvComp=null;
    (new Function(...argNames,transformed))(...argVals);

    const Comp=window.__fvComp;
    if(Comp){
      cleanupRoot(f.id);
      S.roots[f.id]=ReactDOM.createRoot(mount);
      S.roots[f.id].render(React.createElement(ErrorBoundary,null,React.createElement(Comp)));
      S.renderStatus[f.id]="ok";
    } else {
      errors.push({type:"warn",msg:"No PascalCase component found to render."});
      S.renderStatus[f.id]="err";
      mount.innerHTML='<div style="padding:20px;color:#fbbf24;font-family:Consolas,monospace;font-size:12px">No renderable component found.</div>';
    }
  }catch(e){
    errors.push({type:"error",msg:e.message+(e.stack?"\n"+e.stack.split("\n").slice(0,3).join("\n"):"")});
    S.renderStatus[f.id]="err";
    mount.innerHTML='<div style="padding:20px;color:#f87171;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap">Runtime Error:\n'+esc(e.message)+'</div>';
  }
  S.errors[f.id]=errors;refreshErrPanel(f.id);
  const dot=document.querySelector(".pvm .dot");
  if(dot){const st=S.renderStatus[f.id]||"ok";dot.className="dot "+st;const stEl=document.querySelector(".pvm .status");if(stEl)stEl.innerHTML='<span class="dot '+st+'"></span>'+st;}
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error){
    const f=S.files.find(x=>x.id===S.activeTab);
    if(f){S.errors[f.id]=S.errors[f.id]||[];S.errors[f.id].push({type:"error",msg:"React: "+error.message});S.renderStatus[f.id]="err";refreshErrPanel(f.id);}
  }
  render(){if(this.state.error)return React.createElement("div",{style:{padding:20,color:"#f87171",fontFamily:"Consolas,monospace",fontSize:12,whiteSpace:"pre-wrap"}},"React Error:\n"+this.state.error.message);return this.props.children;}
}

function refreshErrPanel(id){
  const ex=document.getElementById("errPanel");
  if(ex)ex.outerHTML=buildErrPanel(id);
  else{const errs=S.errors[id]||[];if(errs.length){const pvbody=document.querySelector(".pvbody");if(pvbody)pvbody.insertAdjacentHTML("afterend",buildErrPanel(id));}}
}

// ═══════════════════════════════════════════════
// FULLSCREEN
// ═══════════════════════════════════════════════
function enterFullscreen(){
  const f=S.files.find(x=>x.id===S.activeTab);if(!f)return;
  S.fullscreen=true;
  let html='<div class="fs-overlay" id="fsOv"><div class="fs-bar"><div class="ti"><span>'+EM[f.cat]+'</span> <span>'+esc(f.name)+'</span></div>';
  html+='<button class="ibtn" onclick="exitFullscreen()" title="Exit (Esc)" style="font-size:16px">\u2715</button></div>';
  html+='<div class="fs-body"><div id="fsMountWrap"></div></div></div>';
  fsOverlay.innerHTML=html;

  const src=S.codeCache[f.id];
  if(f.cat==="react"&&src){
    const mount=document.getElementById("fsMountWrap");
    try{
      let code=src;
      code=code.replace(/^\s*import\s+[\s\S]*?from\s+['"][^'"]*['"]\s*;?\s*$/gm,"");
      code=code.replace(/^\s*import\s+['"][^'"]*['"]\s*;?\s*$/gm,"");
      code=code.replace(/export\s+default\s+/g,"");
      code=code.replace(/export\s+(?=function|const|let|var|class)/g,"");
      let mc=null;const re=/(?:function|const|class)\s+([A-Z][A-Za-z0-9_]*)/g;let m;while((m=re.exec(code))!==null)mc=m[1];
      if(!mc){mc="__FV__";code+="\nvar __FV__=typeof App!=='undefined'?App:function(){return React.createElement('div',{style:{padding:20,color:'#999'}},'No component found');};";}
      code+="\n;window.__fvFSComp=typeof "+mc+"==='function'?"+mc+":null;";
      const out=Babel.transform(code,{presets:["react"]}).code;
      const ctx={};Object.keys(React).forEach(k=>{ctx[k]=React[k];});ctx.React=React;ctx.ReactDOM=ReactDOM;
      if(typeof Recharts!=="undefined")Object.keys(Recharts).forEach(k=>{ctx[k]=Recharts[k];});
      ctx.lucide=new Proxy({},{get:(_,p)=>{if(typeof p!=="string")return undefined;return(pr)=>React.createElement("span",{style:{display:"inline-flex",width:pr?.size||24,height:pr?.size||24},title:p,...pr},"\u2B21");}});
      const an=Object.keys(ctx),av=an.map(k=>ctx[k]);
      window.__fvFSComp=null;(new Function(...an,out))(...av);
      if(window.__fvFSComp){window.__fvFSRoot=ReactDOM.createRoot(mount);window.__fvFSRoot.render(React.createElement(ErrorBoundary,null,React.createElement(window.__fvFSComp)));}
    }catch(e){document.getElementById("fsMountWrap").innerHTML='<div style="padding:20px;color:#f87171;font-family:Consolas,monospace;font-size:12px">'+esc(e.message)+'</div>';}
  } else if(f.cat==="html"&&src){
    const mount=document.getElementById("fsMountWrap");
    const iframe=document.createElement("iframe");iframe.style.cssText="width:100%;height:100%;border:none;background:#fff;";iframe.srcdoc=src;mount.appendChild(iframe);
  } else if(f.cat==="image"){
    readUrl(f.raw,u=>{document.getElementById("fsMountWrap").innerHTML="<div class='center-pv' style='height:100vh'><img src='"+u+"' style='max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px;'/></div>";});
  }
  document.addEventListener("keydown",fsEscHandler);
}
function exitFullscreen(){S.fullscreen=false;if(window.__fvFSRoot){try{window.__fvFSRoot.unmount();}catch(e){}}window.__fvFSRoot=null;fsOverlay.innerHTML="";document.removeEventListener("keydown",fsEscHandler);}
function fsEscHandler(e){if(e.key==="Escape")exitFullscreen();}

// DRAG & DROP
// ═══════════════════════════════════════════════
let dragCount=0;
document.body.addEventListener("dragenter",e=>{e.preventDefault();dragCount++;document.body.style.outline="2px solid rgba(14,165,233,0.4)";document.body.style.outlineOffset="-2px";});
document.body.addEventListener("dragover",e=>e.preventDefault());
document.body.addEventListener("dragleave",e=>{e.preventDefault();dragCount--;if(dragCount<=0){dragCount=0;document.body.style.outline="none";}});
document.body.addEventListener("drop",e=>{e.preventDefault();dragCount=0;document.body.style.outline="none";if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});
fi.addEventListener("change",e=>{if(e.target.files.length)addFiles(e.target.files);e.target.value="";});

showEmpty();drawSB();
